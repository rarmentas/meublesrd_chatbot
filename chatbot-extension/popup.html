<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Meubles RD Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: #f4f6f9;
            width: 360px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header {
            background-color: #b5121b;
            color: white;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
        }

        .header-title { flex: 1; }

        .btn-minimize {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .btn-minimize:hover {
            background: rgba(255,255,255,0.35);
        }

        .minimized-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: #b5121b;
            color: white;
            font-weight: 600;
        }

        .btn-restore {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 28px;
            height: 28px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-restore:hover {
            background: rgba(255,255,255,0.35);
        }

        .subheader {
            font-size: 12px;
            opacity: 0.9;
        }

        .container {
            padding: 15px;
        }

        .button-primary {
            width: 100%;
            padding: 10px;
            background-color: #b5121b;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .button-primary:hover {
            background-color: #8f0e14;
        }

        /* Chat Section */
        .chat-section {
            margin-top: 15px;
        }

        .chatbot-input {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
        }

        .chatbot-input textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 13px;
            font-family: inherit;
            box-sizing: border-box;
            resize: vertical;
            max-height: 200px;
        }

        .chatbot-input textarea:focus {
            outline: none;
            border-color: #b5121b;
        }

        .chat-input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 13px;
            box-sizing: border-box;
            margin-bottom: 8px;
        }

        .chat-button {
            width: 100%;
            padding: 8px;
            background-color: #333;
            color: black;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .chat-button:hover {
            background-color: #000;
        }

        .result-container {
            margin-top: 15px;
            padding: 12px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            max-height: 350px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .result-container h3 {
            margin-top: 10px;
            margin-bottom: 6px;
            font-size: 14px;
            color: #b5121b;
        }

        .result-container h4 {
            margin-top: 8px;
            margin-bottom: 4px;
            font-size: 13px;
            color: #333;
        }

        .result-container p {
            margin: 4px 0;
        }

        .divider {
            margin: 10px 0;
            border-top: 1px solid #eee;
        }

        .status-eligible {
            background-color: #e6f4ea;
            color: #1e7e34;
            padding: 6px;
            border-radius: 5px;
            font-weight: bold;
        }

        .status-not-eligible {
            background-color: #fdecea;
            color: #c82333;
            padding: 6px;
            border-radius: 5px;
            font-weight: bold;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        .loading-spinner {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #e0e0e0;
            border-top-color: #b5121b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <div class="header header-bar">
        <div class="header-title">
            Meubles RD<br>
            <span class="subheader">Service Assistant</span>
        </div>
        <button id="minimizeBtn" class="btn-minimize" title="Minimize">−</button>
    </div>

    <div id="minimizedBar" class="minimized-bar" style="display:none;">
        <span class="minimized-title">Meubles RD</span>
        <button id="restoreBtn" class="btn-restore" title="Restore">□</button>
    </div>

    <div id="mainContent" class="container">

        <button id="analyzeBtn" class="button-primary">
            Analyze Screen
        </button>

        <!-- Chat Section -->
        <div class="chatbot-container">
            <div id="result" class="chatbot-messages result-container">
                <p class="loading">Click "Analyze Screen" to evaluate the current case.</p>
            </div>

            <div class="chatbot-input">
                <textarea id="chatInput" placeholder="Ask a question about this case..." rows="4"></textarea>
                <button id="sendMessageBtn">Send Message</button>
            </div>
        </div>

    </div>

    <script src="popup.js"></script>

</body>
</html>
